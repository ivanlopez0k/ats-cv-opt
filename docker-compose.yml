version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: cvmaster-postgres
    environment:
      POSTGRES_USER: cvmaster
      POSTGRES_PASSWORD: cvmaster123
      POSTGRES_DB: cvmaster
    ports:
      - "5433:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cvmaster-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: